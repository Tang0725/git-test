server:
  port: 8080
  servlet:
    context-path: /api  # 上下文路径

spring:
  application:
    name: week03 开发环境

app:
  app-name: 企业后台管理系统
  version: 1.0.0
  description: 基于 Spring Boot 3.5.11 构建
  published: false
  author:
    name: tqx
